<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chức năng đang được phát triển</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F8FAFC;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --brand-blue: #2563EB;
            --border-color: #E2E8F0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            max-width: 480px;
            width: 100%;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--brand-blue);
        }
        h2 {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #0F172A;
        }
        p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 24px 0;
        }
        .badge {
            background-color: rgba(37, 99, 235, 0.08);
            color: var(--brand-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚙️</div>
        <h2>Chức năng đang phát triển</h2>
        <p>Giao diện chi tiết của chức năng này chưa được xây dựng. Hệ thống đang hiển thị khung nhìn liên kết sẵn để tích hợp nghiệp vụ trong các bước tiếp theo.</p>
        <span class="badge">MOCKUP IFRAME PLACEHOLDER</span>
    </div>
</body>
</html>
